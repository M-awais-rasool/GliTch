<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" font-family="Verdana, Geneva, sans-serif">
  <rect width="960" height="300" fill="#05060A"/>
  <g stroke="#0C1E38" stroke-width="1" opacity="0.5">
    <line x1="0" y1="75" x2="960" y2="75"/><line x1="0" y1="150" x2="960" y2="150"/><line x1="0" y1="225" x2="960" y2="225"/>
    <line x1="120" y1="0" x2="120" y2="300"/><line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/><line x1="840" y1="0" x2="840" y2="300"/>
  </g>

  <!-- title glow + crisp -->
  <text x="80" y="160" fill="#3BA0FF" opacity="0.35" font-size="96" font-weight="bold" letter-spacing="10">GLITCH</text>
  <text x="80" y="158" fill="#FFFFFF" font-size="96" font-weight="bold" letter-spacing="10">GLITCH</text>
  <text x="86" y="200" fill="#8A93A6" font-size="22" letter-spacing="8">MOVE · JUMP · DON'T TRUST THE FLOOR</text>

  <!-- glitch color chips -->
  <g>
    <rect x="86" y="222" width="34" height="8" rx="4" fill="#A14BFF"/>
    <rect x="128" y="222" width="34" height="8" rx="4" fill="#3BA0FF"/>
    <rect x="170" y="222" width="34" height="8" rx="4" fill="#FFD23B"/>
    <rect x="212" y="222" width="34" height="8" rx="4" fill="#3BFF9E"/>
    <rect x="254" y="222" width="34" height="8" rx="4" fill="#FF4B9E"/>
  </g>

  <!-- robot -->
  <g transform="translate(770,150) scale(2.1)">
    <rect x="-26" y="-30" width="52" height="60" rx="12" fill="#3BA0FF" opacity="0.22"/>
    <rect x="-20" y="-24" width="40" height="48" rx="10" fill="#FFFFFF"/>
    <rect x="-15" y="-17" width="30" height="15" rx="7" fill="#05060A"/>
    <rect x="-6" y="-14" width="6" height="9" rx="3" fill="#3BA0FF"/>
    <rect x="3" y="-14" width="6" height="9" rx="3" fill="#3BA0FF"/>
    <rect x="-2" y="-40" width="4" height="12" rx="2" fill="#FFFFFF"/>
    <circle cx="0" cy="-42" r="4.5" fill="#3BA0FF"/>
    <rect x="-16" y="24" width="11" height="6" rx="3" fill="#05060A"/>
    <rect x="5" y="24" width="11" height="6" rx="3" fill="#05060A"/>
  </g>
</svg>
